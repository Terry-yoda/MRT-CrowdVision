<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRT CrowdVision · Bento Studio</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<style>
/* === JUST DARK MODE (純黑美學) === */
:root {
  --color-bg: #09090b;
  --color-surface: #141416;
  --color-surface-2: #222226;
  --color-border: #2d2d34;
  --color-text: #f4f4f5;
  --color-muted: #a1a1aa;
  --color-faint: #3f3f46;
  
  --color-primary: #3b82f6;
  --color-success: #10b981;
  --color-warn: #f59e0b;
  --color-err: #ef4444;
  
  --r-md: 10px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
  
  --sp3: 12px; --sp4: 16px; --sp6: 24px;
  --tx: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font-body: "Satoshi", "Inter", sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100dvh;
  font-family: var(--font-body);
  color: var(--color-text);
  background: var(--color-bg);
  padding: var(--sp6);
  display: flex;
  flex-direction: column;
  gap: var(--sp6);
}

/* === BENTO STRUCTURE === */
.bento-layout {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: var(--sp6);
}

.bento-item {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--r-xl);
  padding: var(--sp6);
  display: flex;
  flex-direction: column;
  gap: var(--sp4);
}

/* === TOPBAR BRAND & TABS === */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp4) var(--sp6);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--r-xl);
}
.brand { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.15rem; letter-spacing: -0.02em; min-width: 200px; }
.brand span { color: var(--color-primary); }

.tab-bar { display: flex; gap: 8px; background: var(--color-surface-2); padding: 4px; border-radius: var(--r-lg); }
.tab-btn { padding: 8px 20px; font-size: 0.85rem; font-weight: 600; border-radius: var(--r-md); color: var(--color-muted); transition: var(--tx); }
.tab-btn.active { background: var(--color-bg); color: var(--color-text); }

/* === INTERACTIVE TOGGLE SWITCH === */
.toggle { position: relative; width: 44px; height: 24px; min-width: 44px; display: inline-block; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track { position: absolute; inset: 0; background: var(--color-surface-2); border-radius: var(--r-full); cursor: pointer; transition: var(--tx); border: 1px solid var(--color-border); }
.toggle input:checked + .toggle-track { background: var(--color-primary); border-color: transparent; }
.toggle-thumb { position: absolute; top: 4px; left: 4px; width: 14px; height: 14px; background: #fff; border-radius: var(--r-full); transition: var(--tx); pointer-events: none; }
.toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

/* === COMPONENTS === */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 8px 16px; font-size: 0.85rem; font-weight: 600;
  border-radius: var(--r-md); transition: var(--tx); white-space: nowrap;
}
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: var(--color-surface-2); color: var(--color-text); }
.btn-ghost:hover { background: var(--color-border); }
.btn-sm { padding: 5px 10px; font-size: 0.75rem; border-radius: 6px; }

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 0.75rem; color: var(--color-muted); font-weight: 500; }
.form-input, .form-select {
  padding: 10px 12px; background: var(--color-bg); border: 1px solid var(--color-border);
  border-radius: var(--r-md); font-size: 0.85rem; outline: none; color: #fff;
}

.box-title { font-size: 0.95rem; font-weight: 600; color: var(--color-text); display: flex; justify-content: space-between; align-items: center; }

/* TRAIN BAR (Span 12) */
.train-box { grid-column: span 12; }
.train-flex { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
.car-tile {
  flex: 1; min-width: 140px; background: var(--color-surface-2); border-radius: var(--r-lg);
  padding: var(--sp6) var(--sp4); text-align: center; border: 1px solid transparent;
}
.car-bar { height: 6px; background: var(--color-bg); border-radius: var(--r-full); overflow: hidden; margin: 16px 0; }
.car-fill { height: 100%; transition: width 0.4s ease, background-color 0.4s; }

/* STATS BLOCKS */
.stats-grid { grid-column: span 12; display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp6); }
.stat-box { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--r-xl); padding: var(--sp6); display: flex; flex-direction: column; gap: 8px; }
.stat-val { font-size: 2rem; font-weight: 700; color: var(--color-text); }

/* GRID CARDS (Span 9) */
.cards-region { grid-column: span 9; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: var(--sp6); align-content: start; }
.bento-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--r-xl); padding: var(--sp4); display: flex; flex-direction: column; gap: 12px; height: 100%;
}
.card-preview-window {
  position: relative; background: #020204; border-radius: var(--r-md); overflow: hidden;
  aspect-ratio: 16/9; margin-top: 4px; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--color-border);
}
.live-media { max-width: 100%; max-height: 100%; object-fit: contain; }
.live-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

/* SIDEBAR PARAMS (Span 3) */
.sidebar-region { grid-column: span 3; height: max-content; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: var(--tx); z-index: 100;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--r-xl); padding: var(--sp6); width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: var(--sp4); }

/* TOAST */
.toast-stack { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
.toast { background: var(--color-surface-2); border: 1px solid var(--color-border); padding: 12px 20px; border-radius: var(--r-md); font-size: 0.8rem; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">MRT CrowdVision <span>Studio</span></div>
  
  <div class="tab-bar">
    <button id="tab-overview" class="tab-btn active" onclick="switchTab('overview')">負載總覽</button>
    <button id="tab-cameras" class="tab-btn" onclick="switchTab('cameras')">視訊監控</button>
  </div>

  <div style="display:flex; gap: 16px; align-items: center; min-width: 200px; justify-content: flex-end;">
    <span id="backendStatus" style="font-size: 0.75rem; color: var(--color-muted);">環境未載入</span>
    <button class="btn btn-primary btn-sm" id="initBtn" onclick="initModel()">啟動 YOLO12</button>
  </div>
</header>

<div id="view-overview" class="bento-layout">
  <div class="bento-item train-box">
    <div class="box-title">板南線即時編組負載狀況 (列車 T-1024)</div>
    <div class="train-flex" id="trainTrack"></div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div style="font-size: 0.85rem; color: var(--color-muted); font-weight: 600;">全車總人數</div>
      <div class="stat-val" id="stat-total-people">0 <span style="font-size: 1rem; font-weight: 400; color: var(--color-muted);">人</span></div>
    </div>
    <div class="stat-box">
      <div style="font-size: 0.85rem; color: var(--color-muted); font-weight: 600;">最高擁擠車廂</div>
      <div class="stat-val" id="stat-max-car">--</div>
    </div>
    <div class="stat-box">
      <div style="font-size: 0.85rem; color: var(--color-muted); font-weight: 600;">運行中監控端點</div>
      <div class="stat-val" id="stat-active-cams" style="color: var(--color-primary);">0 <span style="font-size: 1rem; font-weight: 400; color: var(--color-muted);">組</span></div>
    </div>
  </div>
</div>

<div id="view-cameras" class="bento-layout" style="display: none;">
  <div class="cards-region">
    <div id="cardsGrid" style="display: contents;"></div>
    
    <div class="bento-card" style="justify-content: center; align-items: center; border-style: dashed; border-color: var(--color-faint); background: transparent; min-height: 160px; cursor: pointer;" onclick="openCamModal()">
      <div style="color: var(--color-muted); font-size: 0.85rem; font-weight: 500;">+ 新增車廂鏡頭 / 圖片資料夾</div>
    </div>
  </div>

  <div class="bento-item sidebar-region">
    <div class="box-title">模型推論核心參數</div>
    <div class="form-group" style="margin-top: 8px;">
      <label class="form-label">信心閾值 (Confidence): <span id="confLabel">50%</span></label>
      <input type="range" min="10" max="95" value="50" style="width:100%" oninput="state.conf = this.value/100; document.getElementById('confLabel').innerText=this.value+'%'">
    </div>
    <div class="form-group">
      <label class="form-label">NMS IoU 覆蓋度: <span id="iouLabel">0.45</span></label>
      <input type="range" min="10" max="90" value="45" style="width:100%" oninput="state.iou = this.value/100; document.getElementById('iouLabel').innerText=(this.value/100).toFixed(2)">
    </div>
    <div style="border-top: 1px solid var(--color-border); padding-top: var(--sp4); font-size: 0.7rem; color: var(--color-muted); line-height: 1.6;">
      💡 <strong>提示</strong>：推論引擎會在背景獨立運作。已支援多端點併發啟動，互不干擾。
    </div>
  </div>
</div>

<div class="modal-overlay" id="camModal" onclick="if(event.target===this) closeCamModal()">
  <div class="modal">
    <div class="box-title">配置新視訊端點</div>
    <div class="form-group">
      <label class="form-label">指派車廂編號</label>
      <select class="form-select" id="modalCarId"></select>
    </div>
    <div class="form-group">
      <label class="form-label">輸入來源類別</label>
      <select class="form-select" id="modalSourceType" onchange="updateModalUI()">
        <option value="folder">本機圖片資料夾 (每5秒更換測試)</option>
        <option value="webcam">本機電腦攝影機 (Webcam)</option>
        <option value="url">網路影像串流 URL (RTSP/HTTP)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" id="modalInputLabel">資料夾絕對路徑</label>
      <input type="text" class="form-input" id="modalInput" placeholder="例如: C:\Dataset\MRT_Images">
    </div>
    <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;">
      <button class="btn btn-ghost btn-sm" onclick="closeCamModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveCamera()">儲存設定</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toasts"></div>

<script>
const state = {
  modelReady: false,
  conf: 0.5,
  iou: 0.45,
  cars: Array.from({length: 6}, (_, i) => ({ id: i+1, count: 0, cap: 80 })),
  cameras: [] // { carId, type, src, online: false, timer: null }
};

// ==========================================
// 頁籤切換控制
// ==========================================
function switchTab(tabId) {
  document.getElementById('tab-overview').classList.toggle('active', tabId === 'overview');
  document.getElementById('tab-cameras').classList.toggle('active', tabId === 'cameras');
  
  document.getElementById('view-overview').style.display = tabId === 'overview' ? 'grid' : 'none';
  document.getElementById('view-cameras').style.display = tabId === 'cameras' ? 'grid' : 'none';
}

// ==========================================
// 後端載入
// ==========================================
async function initModel() {
  const btn = document.getElementById('initBtn');
  btn.disabled = true; btn.innerText = '配置權重中...';
  try {
    const res = await fetch('/api/load', { method: 'POST' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    
    state.modelReady = true;
    const status = document.getElementById('backendStatus');
    status.innerText = `🟢 YOLO12 ON · ${data.device.toUpperCase()}`;
    status.style.color = 'var(--color-success)';
    btn.style.display = 'none';
    showToast(`加速硬體佈署成功 (${data.device.toUpperCase()})`);
    
    // 重新渲染畫面以解鎖開關
    renderSurveillanceGrid();
  } catch(e) {
    btn.disabled = false; btn.innerText = '重新嘗試';
    showToast('後端引擎啟動異常: ' + e.message, true);
  }
}

// ==========================================
// 視圖渲染流程 (加入 DOM 保護機制)
// ==========================================
function renderOverview() {
  const track = document.getElementById('trainTrack');
  track.innerHTML = state.cars.map(c => {
    const r = Math.min(1, c.count / c.cap);
    const col = r < 0.4 ? 'var(--color-success)' : (r < 0.75 ? 'var(--color-warn)' : 'var(--color-err)');
    return `
      <div class="car-tile">
        <div style="font-size:0.75rem; color:var(--color-muted); font-weight:700;">第 ${c.id} 節車廂</div>
        <div style="font-size:1.5rem; font-weight:700; margin-top:8px;">${c.count} <span style="font-size:0.8rem; font-weight:400; color:var(--color-muted);">人</span></div>
        <div class="car-bar"><div class="car-fill" style="width:${r*100}%; background:${col}"></div></div>
        <div style="font-size:0.75rem; color:${col}; font-weight:600;">${Math.round(r*100)}% 滿載</div>
      </div>
    `;
  }).join('');

  const totalPeople = state.cars.reduce((sum, c) => sum + c.count, 0);
  document.getElementById('stat-total-people').innerHTML = `${totalPeople} <span style="font-size: 1rem; font-weight: 400; color: var(--color-muted);">人</span>`;
  
  const activeCams = state.cameras.filter(c => c.online).length;
  document.getElementById('stat-active-cams').innerHTML = `${activeCams} <span style="font-size: 1rem; font-weight: 400; color: var(--color-muted);">組</span>`;

  let maxCar = null;
  let maxRatio = -1;
  state.cars.forEach(c => {
    const r = c.count / c.cap;
    if (r > maxRatio && c.count > 0) { maxRatio = r; maxCar = c; }
  });
  
  if (maxCar) {
    const col = maxRatio < 0.4 ? 'var(--color-success)' : (maxRatio < 0.75 ? 'var(--color-warn)' : 'var(--color-err)');
    document.getElementById('stat-max-car').innerHTML = `C${maxCar.id} <span style="font-size: 1rem; font-weight: 400; color: ${col};">(${Math.round(maxRatio*100)}%)</span>`;
  } else {
    document.getElementById('stat-max-car').innerHTML = '--';
  }
}

function renderSurveillanceGrid() {
  const grid = document.getElementById('cardsGrid');

  // 初始化時建立固定的包裝容器 (Wrapper)，確保卡片不會被全部清空
  if (grid.children.length === 0) {
    state.cars.forEach(c => {
      const wrapper = document.createElement('div');
      wrapper.id = `card-wrapper-${c.id}`;
      wrapper.style.display = 'contents';
      grid.appendChild(wrapper);
    });
  }

  state.cars.forEach(c => {
    const cam = state.cameras.find(cam => cam.carId === c.id);
    const wrapper = document.getElementById(`card-wrapper-${c.id}`);

    // 【核心修復】如果該鏡頭正在推論中，絕對不重新渲染它的 DOM，只更新數據
    if (cam && cam.online) {
      return; 
    }

    if (!cam) {
      wrapper.innerHTML = `
        <div class="bento-card" style="justify-content: center; align-items: center; border-style: dashed; border-color: #222; opacity:0.6; min-height: 160px; cursor: pointer;" onclick="openCamModal(${c.id})">
          <div style="color: var(--color-muted); font-size: 0.8rem;">+ C${c.id} 車廂尚未配置端點</div>
        </div>
      `;
    } else {
      wrapper.innerHTML = `
        <div class="bento-card">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div style="font-weight: 700; font-size:0.9rem;">第 ${c.id} 節車廂 · 視訊監控</div>
              <div style="font-size: 0.7rem; color: var(--color-muted); max-width:190px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${cam.src}">
                ${cam.type === 'folder' ? '📁 ' + cam.src : (cam.type==='url' ? '🔗 網路串流' : '📹 本機 Webcam')}
              </div>
            </div>
            <label class="toggle">
              <input type="checkbox" ${cam.online ? 'checked' : ''} ${state.modelReady ? '' : 'disabled'} onchange="toggleInference(${c.id}, this.checked)">
              <div class="toggle-track"></div><div class="toggle-thumb"></div>
            </label>
          </div>

          <div class="card-preview-window" id="previewBox-${c.id}" style="display: ${cam.online ? 'flex' : 'none'};">
            <video id="vid-${c.id}" class="live-media" autoplay muted playsinline style="display:none"></video>
            <img id="img-${c.id}" class="live-media" crossorigin="anonymous" style="display:none" />
            <canvas id="canvas-${c.id}" class="live-canvas"></canvas>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; border-top:1px solid var(--color-border); padding-top:10px; margin-top:auto;">
            <div>目前檢出: <strong id="lblCount-${c.id}" style="color:var(--color-primary);">${c.count}</strong> 人</div>
            <div style="color: var(--color-muted);" id="lblLat-${c.id}">-- ms</div>
            <button class="btn btn-ghost btn-sm" style="color: var(--color-err); padding:2px 6px;" onclick="removeCamera(${c.id})">移除</button>
          </div>
        </div>
      `;
    }
  });
}

// ==========================================
// 獨立推論循環 (局部更新 UI，不干擾其他視窗)
// ==========================================
async function toggleInference(carId, checked) {
  const cam = state.cameras.find(c => c.carId === carId);
  if (!cam) return;

  if (!checked) {
    cam.online = false;
    if (cam.timer) { clearTimeout(cam.timer); cam.timer = null; }
    
    // 停止串流與釋放資源
    setTimeout(() => {
      const vid = document.getElementById(`vid-${carId}`);
      const img = document.getElementById(`img-${carId}`);
      
      if (vid) {
        if (vid.srcObject) { vid.srcObject.getTracks().forEach(t => t.stop()); vid.srcObject = null; }
        vid.src = '';
        vid.style.display = 'none';
      }
      if (img) { img.src = ''; img.style.display = 'none'; }
      
      const box = document.getElementById(`previewBox-${carId}`);
      if (box) box.style.display = 'none';

      const car = state.cars.find(c => c.id === carId);
      if (car) car.count = 0;
      
      document.getElementById(`lblCount-${carId}`).innerText = '0';
      document.getElementById(`lblLat-${carId}`).innerText = '-- ms';

      renderOverview();
    }, 100);
    return;
  }

  // 開啟串流機制
  cam.online = true;
  
  const box = document.getElementById(`previewBox-${carId}`);
  if (box) box.style.display = 'flex';
  renderOverview();
  
  const vid = document.getElementById(`vid-${carId}`);
  const img = document.getElementById(`img-${carId}`);

  try {
    if (cam.type === 'folder') {
      // 加上 Timestamp 強制重新載入
      img.src = '/api/stream_folder?fps=0.2&path=' + encodeURIComponent(cam.src) + '&t=' + Date.now();
      img.style.display = 'block';
      vid.style.display = 'none';
    } else if (cam.type === 'webcam') {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      vid.srcObject = stream;
      vid.style.display = 'block';
      img.style.display = 'none';
    } else {
      vid.src = cam.src;
      vid.style.display = 'block';
      img.style.display = 'none';
    }
    
    cam.timer = setTimeout(() => runCardInferenceLoop(carId), 300);
  } catch (e) {
    showToast('影像來源啟動失敗: ' + e.message, true);
    cam.online = false;
    if (box) box.style.display = 'none';
    
    // 若出錯自動將開關彈回
    const toggle = document.querySelector(`#card-wrapper-${carId} input[type="checkbox"]`);
    if (toggle) toggle.checked = false;
    renderOverview();
  }
}

async function runCardInferenceLoop(carId) {
  const cam = state.cameras.find(c => c.carId === carId);
  if (!cam || !cam.online) return;

  const media = cam.type === 'folder' ? document.getElementById(`img-${carId}`) : document.getElementById(`vid-${carId}`);
  const cvs = document.getElementById(`canvas-${carId}`);
  
  if (media && cvs) {
    const w = media.videoWidth || media.naturalWidth || 640;
    const h = media.videoHeight || media.naturalHeight || 360;
    
    if (w && h) {
      cvs.width = w; cvs.height = h;
      
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = w; tempCanvas.height = h;
      tempCanvas.getContext('2d').drawImage(media, 0, 0, w, h);
      const b64 = tempCanvas.toDataURL('image/jpeg', 0.75);
      
      try {
        const res = await fetch('/api/infer', {
          method: 'POST',
          body: JSON.stringify({ image: b64, conf: state.conf, iou: state.iou })
        });
        const data = await res.json();
        
        if (data.boxes && cam.online) {
          drawBentoBoxes(cvs, data.boxes);
          
          document.getElementById(`lblCount-${carId}`).innerText = data.count;
          document.getElementById(`lblLat-${carId}`).innerText = data.latency + ' ms';
          
          const car = state.cars.find(c => c.id === carId);
          if (car) car.count = data.count;
          
          renderOverview(); // 僅更新數據，不重繪 DOM
        }
      } catch (e) { console.error('Inference error:', e); }
    }
  }
  
  const nextInterval = cam.type === 'folder' ? 5000 : 350;
  cam.timer = setTimeout(() => runCardInferenceLoop(carId), nextInterval);
}

function drawBentoBoxes(canvas, boxes) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.lineWidth = 2;
  ctx.font = 'bold 13px sans-serif';
  
  boxes.forEach(b => {
    const x = b.x * canvas.width; const y = b.y * canvas.height;
    const w = b.w * canvas.width; const h = b.h * canvas.height;
    ctx.strokeStyle = 'var(--color-primary)';
    ctx.fillStyle = 'rgba(59, 130, 246, 0.15)';
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 4);
    ctx.stroke(); ctx.fill();
    
    ctx.fillStyle = 'var(--color-primary)';
    ctx.fillText(`${Math.round(b.conf*100)}%`, x + 3, y - 5 > 10 ? y - 5 : y + 14);
  });
}

// ==========================================
// 視訊端點配置視窗管理
// ==========================================
function openCamModal(preselect = null) {
  const sel = document.getElementById('modalCarId');
  sel.innerHTML = state.cars.filter(c => !state.cameras.some(cam => cam.carId === c.id))
                            .map(c => `<option value="${c.id}">組員車廂 ${c.id}</option>`).join('');
  if (!sel.innerHTML) { showToast('所有車廂皆已分配完鏡頭端點'); return; }
  
  if (preselect) sel.value = preselect;
  
  document.getElementById('modalSourceType').value = 'folder';
  updateModalUI();
  document.getElementById('camModal').classList.add('open');
}

function closeCamModal() { document.getElementById('camModal').classList.remove('open'); }

function updateModalUI() {
  const type = document.getElementById('modalSourceType').value;
  const lbl = document.getElementById('modalInputLabel');
  const inp = document.getElementById('modalInput');
  if (type === 'folder') { lbl.innerText = '本機圖片資料夾絕對路徑'; inp.placeholder = '例如: D:\\Dataset\\mrt_images'; }
  else if (type === 'url') { lbl.innerText = '影像網路串流 URL'; inp.placeholder = 'rtsp://192.168...'; }
  else { lbl.innerText = '裝置通道識別碼 (留空為預設)'; inp.placeholder = '預設 0'; }
}

function saveCamera() {
  const carId = parseInt(document.getElementById('modalCarId').value);
  const type = document.getElementById('modalSourceType').value;
  let src = document.getElementById('modalInput').value.trim();
  if (type === 'webcam' && !src) src = '0';
  if (type !== 'webcam' && !src) { showToast('請填入完整路徑格式', true); return; }
  
  state.cameras.push({ carId, type, src, online: false, timer: null });
  closeCamModal();
  renderOverview();
  renderSurveillanceGrid();
  showToast(`車廂 C${carId} 註冊成功`);
}

function removeCamera(carId) {
  const cam = state.cameras.find(c => c.carId === carId);
  if (cam) {
    if (cam.timer) clearTimeout(cam.timer);
    
    // 清除鏡頭資源
    const vid = document.getElementById(`vid-${carId}`);
    if (vid && vid.srcObject) { vid.srcObject.getTracks().forEach(t => t.stop()); }
  }
  
  state.cameras = state.cameras.filter(c => c.carId !== carId);
  const car = state.cars.find(c => c.id === carId);
  if (car) car.count = 0;
  
  renderOverview();
  renderSurveillanceGrid();
}

function showToast(msg, isError = false) {
  const s = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast'; t.innerText = msg;
  if (isError) t.style.borderLeft = '3px solid var(--color-err)';
  s.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// 初始配置
renderOverview();
renderSurveillanceGrid();
</script>
