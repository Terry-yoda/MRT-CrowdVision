<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MRT CrowdVision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/x-icon" href="tabicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #04060f;
  --surface: #090d1a;
  --card:    #0d1120;
  --card2:   #111827;
  --border:  rgba(255,255,255,0.07);
  --text:    #e8ecf5;
  --muted:   #6b7693;
  --faint:   #151d2e;
  --tx: 0.25s cubic-bezier(.4,0,.2,1);
  --c-low:   #00d98b;
  --c-mid:   #f5a623;
  --c-high:  #ff4757;
  --line-col: #0070BD;
  --line-rgb: 0,112,189;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 45% at 15% 5%,  rgba(var(--line-rgb),0.13) 0%, transparent 65%),
    radial-gradient(ellipse 50% 50% at 85% 95%, rgba(var(--line-rgb),0.07) 0%, transparent 65%);
  pointer-events: none; z-index: 0; transition: background 0.8s;
}

.page { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100dvh; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(4,6,15,0.85);
  backdrop-filter: blur(14px);
  position: sticky; top: 0; z-index: 50;
  gap: 10px;
}
.brand {
  font-family: 'Orbitron', monospace;
  font-size: clamp(0.68rem, 2.2vw, 0.95rem);
  font-weight: 800; letter-spacing: 0.08em; white-space: nowrap;
}
.brand em { color: var(--line-col); font-style: normal; transition: color 0.5s; }

.station-badge {
  display: flex; flex-direction: column; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 5px 14px; min-width: 0;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.station-line-chip {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; color: #fff;
  background: var(--line-col); border-radius: 4px; padding: 2px 7px; margin-bottom: 3px;
  transition: background 0.5s; white-space: nowrap;
}
.station-name {
  font-size: clamp(1rem, 4vw, 1.3rem); font-weight: 900;
  letter-spacing: -0.01em; white-space: nowrap;
}
.clock {
  font-family: 'Orbitron', monospace;
  font-size: clamp(0.82rem, 2.3vw, 1.05rem);
  font-weight: 600; color: var(--line-col); letter-spacing: 0.06em;
  white-space: nowrap; transition: color 0.5s;
}

/* ── Main ── */
.main {
  flex: 1; padding: 14px;
  display: flex; flex-direction: column; gap: 14px;
  max-width: 1000px; width: 100%; margin: 0 auto;
}

/* ── Two direction columns ── */
.directions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-items: start;
}
@media(max-width: 540px) {
  .directions { grid-template-columns: 1fr; }
}

/* ── Direction panel ── */
.dir-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* coloured top bar */
.dir-top-bar {
  height: 3px;
  background: var(--line-col);
  transition: background 0.5s;
  flex-shrink: 0;
}

.dir-inner { padding: 14px 14px 16px; display: flex; flex-direction: column; gap: 11px; }

.dir-header { display: flex; align-items: center; justify-content: space-between; }
.dir-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }
.model-badge {
  font-size: 0.6rem; padding: 2px 7px; border-radius: 20px;
  font-weight: 700; letter-spacing: 0.06em;
  background: rgba(0,217,139,0.1); color: var(--c-low);
}
.model-badge.offline { background: rgba(107,118,147,0.15); color: var(--muted); }

.dir-dest {
  font-size: clamp(1.05rem, 3.8vw, 1.25rem); font-weight: 900;
  display: flex; align-items: center; gap: 7px;
}
.arrow { opacity: 0.45; font-size: 0.9em; }

/* ETA rows */
.eta-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--faint); border-radius: 10px; padding: 8px 12px;
}
.eta-row.dim { opacity: 0.5; }
.eta-col { display: flex; flex-direction: column; gap: 1px; }
.eta-lbl { font-size: 0.68rem; color: var(--muted); }
.eta-val {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1rem, 3.5vw, 1.3rem); font-weight: 800;
  color: var(--line-col); transition: color 0.5s; line-height: 1;
}
.eta-val.small { font-size: clamp(0.85rem, 2.5vw, 1rem); }
.eta-unit { font-size: 0.68rem; color: var(--muted); font-family: inherit; }

.crowd-pill {
  font-size: 0.68rem; font-weight: 700;
  padding: 3px 9px; border-radius: 20px; letter-spacing: 0.04em; white-space: nowrap;
}
.crowd-low  { background: rgba(0,217,139,0.15);  color: var(--c-low); }
.crowd-mid  { background: rgba(245,166,35,0.15);  color: var(--c-mid); }
.crowd-high { background: rgba(255,71,87,0.15);   color: var(--c-high); }

/* ── Car diagram inside direction panel ── */
.cars-header {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase;
  border-top: 1px solid var(--border); padding-top: 11px;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--c-low); display: inline-block;
  animation: pulse 1.8s ease-in-out infinite;
  margin-left: 5px; vertical-align: middle;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.train-diagram {
  display: flex; gap: 5px; align-items: stretch;
  overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: thin;
}
.train-diagram::-webkit-scrollbar { height: 3px; }
.train-diagram::-webkit-scrollbar-track { background: transparent; }
.train-diagram::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.car-block {
  flex: 1; min-width: 54px;
  background: var(--faint);
  border-radius: 9px; border: 1px solid transparent;
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 4px 7px; gap: 4px;
  transition: border-color 0.3s;
}
.car-num  { font-size: 0.58rem; color: var(--muted); font-weight: 700; }
.car-icon { font-size: 1.1rem; line-height: 1; }
.car-count {
  font-family: 'Orbitron', monospace;
  font-size: clamp(0.75rem, 1.8vw, 0.9rem); font-weight: 700; line-height: 1;
}
.car-bar-wrap { width: 100%; height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
.car-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease, background-color 0.4s; }
.car-pct { font-size: 0.55rem; color: var(--muted); }

/* ── Stats row ── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.stat-tile {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 3px;
}
.stat-lbl { font-size: 0.62rem; color: var(--muted); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
.stat-val { font-family: 'Orbitron', monospace; font-size: clamp(1.05rem, 3.2vw, 1.5rem); font-weight: 800; }
.stat-sub { font-size: 0.62rem; color: var(--muted); }

.admin-link { text-align: center; font-size: 0.68rem; padding: 6px 0 18px; }
.admin-link a { color: var(--muted); text-decoration: none; opacity: 0.35; transition: opacity 0.2s; }
.admin-link a:hover { opacity: 0.75; }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="brand">MRT <em>CrowdVision</em></div>
    <div class="station-badge">
      <div class="station-line-chip" id="lineChip">──</div>
      <div class="station-name" id="stationName">載入中…</div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <main class="main">

    <!-- Two direction panels, each with ETAs + car diagram -->
    <div class="directions">

      <!-- Direction A -->
      <div class="dir-panel">
        <div class="dir-top-bar"></div>
        <div class="dir-inner">
          <div class="dir-header">
            <div class="dir-label">往</div>
            <span class="model-badge offline" id="modelBadgeA">辨識離線</span>
          </div>
          <div class="dir-dest">
            <span id="destA">──</span>
            <span class="arrow">›</span>
          </div>

          <!-- Next train -->
          <div class="eta-row">
            <div class="eta-col">
              <span class="eta-lbl">下一班</span>
              <span class="eta-val" id="etaAVal">--<span class="eta-unit"> 分</span></span>
            </div>
            <span class="crowd-pill crowd-low" id="crowdA">──</span>
          </div>
          <!-- Train after next -->
          <div class="eta-row dim">
            <div class="eta-col">
              <span class="eta-lbl">再下一班</span>
              <span class="eta-val small" id="eta2AVal">--<span class="eta-unit"> 分</span></span>
            </div>
            <span class="crowd-pill crowd-low" id="crowd2A">──</span>
          </div>

          <!-- Car crowd for direction A -->
          <div class="cars-header">
            <span>車廂擁擠狀況<span class="live-dot"></span></span>
          </div>
          <div class="train-diagram" id="diagramA"></div>
        </div>
      </div>

      <!-- Direction B -->
      <div class="dir-panel">
        <div class="dir-top-bar"></div>
        <div class="dir-inner">
          <div class="dir-header">
            <div class="dir-label">往</div>
            <span class="model-badge offline" id="modelBadgeB">離線中</span>
          </div>
          <div class="dir-dest">
            <span id="destB">──</span>
            <span class="arrow">›</span>
          </div>

          <div class="eta-row">
            <div class="eta-col">
              <span class="eta-lbl">下一班</span>
              <span class="eta-val" id="etaBVal">--<span class="eta-unit"> 分</span></span>
            </div>
            <span class="crowd-pill crowd-low" id="crowdB">──</span>
          </div>
          <div class="eta-row dim">
            <div class="eta-col">
              <span class="eta-lbl">再下一班</span>
              <span class="eta-val small" id="eta2BVal">--<span class="eta-unit"> 分</span></span>
            </div>
            <span class="crowd-pill crowd-low" id="crowd2B">──</span>
          </div>

          <!-- Car crowd for direction B — reversed order to show "approaching from opposite end" -->
          <div class="cars-header">
            <span>車廂擁擠狀況<span class="live-dot"></span></span>
          </div>
          <div class="train-diagram" id="diagramB"></div>
        </div>
      </div>

    </div>

    <!-- Summary stats -->
    <div class="stats-row">
      <div class="stat-tile">
        <div class="stat-lbl">總人數</div>
        <div class="stat-val" id="statTotal" style="color:var(--line-col);">--</div>
        <div class="stat-sub">乘客 人</div>
      </div>
      <div class="stat-tile">
        <div class="stat-lbl">最擁擠車廂</div>
        <div class="stat-val" id="statMaxCar">--</div>
        <div class="stat-sub" id="statMaxCarSub">──</div>
      </div>
      <div class="stat-tile">
        <div class="stat-lbl">平均每節</div>
        <div class="stat-val" id="statAvg">--</div>
        <div class="stat-sub">乘客 人</div>
      </div>
    </div>

  </main>
  <div class="admin-link"><a href="/admin">管理後台</a></div>
</div>

<script>
// ── State ──
let numCars = 6;
let schedules = { A: [3,8], B: [2,6] };

// ── Clock ──
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('zh-TW', { hour12: false });
}
setInterval(updateClock, 1000); updateClock();

// ── Colour helpers ──
function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)].join(',');
}
function setLineColor(col) {
  document.documentElement.style.setProperty('--line-col', col);
  document.documentElement.style.setProperty('--line-rgb', hexToRgb(col));
}
function crowdColor(r) { return r < 0.5 ? 'var(--c-low)' : r < 0.8 ? 'var(--c-mid)' : 'var(--c-high)'; }
function crowdClass(r) { return 'crowd-pill ' + (r < 0.5 ? 'crowd-low' : r < 0.8 ? 'crowd-mid' : 'crowd-high'); }
function crowdText(r)  { return r < 0.5 ? '舒適' : r < 0.8 ? '擁擠' : '非常擁擠'; }

// ── Build / update car diagram ──
// dir = 'A' | 'B'  — direction B shows cars in reversed order (train comes from the other end)
function renderDiagram(containerId, cars, reversed) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const ordered = reversed ? [...cars].reverse() : [...cars];

  // Sync count
  while (container.children.length > ordered.length) container.lastChild.remove();

  ordered.forEach((c) => {
    const ratio = Math.min(c.count / (c.cap || 80), 1);
    const col   = crowdColor(ratio);
    const pct   = Math.round(ratio * 100);
    const uid   = `${containerId}-c${c.id}`;

    let block = document.getElementById(uid);
    if (!block) {
      block = document.createElement('div');
      block.className = 'car-block';
      block.id = uid;
      block.innerHTML = `
        <div class="car-num">C${c.id}</div>
        <div class="car-count" id="${uid}-cnt">--</div>
        <div class="car-bar-wrap"><div class="car-bar-fill" id="${uid}-bar"></div></div>
        <div class="car-pct" id="${uid}-pct">--%</div>`;
      container.appendChild(block);
    }

    document.getElementById(`${uid}-cnt`).textContent = c.count;
    document.getElementById(`${uid}-pct`).textContent = pct + '%';
    const fill = document.getElementById(`${uid}-bar`);
    fill.style.width = pct + '%';
    fill.style.backgroundColor = col;
    block.style.borderColor = ratio > 0.72 ? col : 'transparent';
    // colour the count
    document.getElementById(`${uid}-cnt`).style.color = crowdColor(ratio);
  });
}

// ── ETA schedules（秒級真實倒數）──
// schedules 儲存的是「剩餘秒數」，顯示時除以 60 取整數分鐘
function generateSchedule() {
  const base = (Math.floor(Math.random() * 5) + 1) * 60;          // 1~5 分鐘，換算成秒
  const gap  = (Math.floor(Math.random() * 5) + 3) * 60;          // 間距 3~7 分鐘
  return [base, base + gap];
}
function refreshSchedules() {
  schedules.A = generateSchedule();
  schedules.B = generateSchedule();
}

// 每秒倒數一格；第一班到站後，第二班成為第一班，再產生新的第二班
setInterval(() => {
  ['A', 'B'].forEach(d => {
    schedules[d] = schedules[d].map(v => Math.max(0, v - 1));
    if (schedules[d][0] === 0) {
      // 第一班到站：第二班頂上，重新產生下一班間距
      const gap = (Math.floor(Math.random() * 5) + 3) * 60;
      schedules[d] = [schedules[d][1], schedules[d][1] + gap];
    }
  });
  updateETAText();
}, 1000);

function updateETAText() {
  const toMin = s => Math.max(0, Math.ceil(s / 60));   // 秒 → 分鐘（無條件進位，0 秒顯示 0）
  const set = (id, val) => {
    const el = document.getElementById(id);
    if (el) el.childNodes[0].textContent = val;
  };
  set('etaAVal',  toMin(schedules.A[0]));
  set('eta2AVal', toMin(schedules.A[1]));
  set('etaBVal',  toMin(schedules.B[0]));
  set('eta2BVal', toMin(schedules.B[1]));
}

// ── Update crowd pills (兩方向各自計算) ──
function updateCrowdPills(carsA, carsB) {
  const ratio = (cars) => {
    const total = cars.reduce((s,c) => s + c.count, 0);
    const cap   = cars.reduce((s,c) => s + (c.cap||80), 0) || 1;
    return Math.min(total / cap, 1);
  };
  const rA = ratio(carsA);
  const rB = ratio(carsB);
  [['A', rA], ['B', rB]].forEach(([d, r]) => {
    const el1 = document.getElementById(`crowd${d}`);
    const el2 = document.getElementById(`crowd2${d}`);
    if(el1) { el1.textContent = crowdText(r);       el1.className = crowdClass(r); }
    if(el2) { el2.textContent = crowdText(r * 0.6); el2.className = crowdClass(r * 0.6); }
  });
}

// ── Stats (合計兩方向) ──
function updateStats(carsA, carsB) {
  const all    = [...carsA, ...carsB];
  const total  = all.reduce((s,c) => s + c.count, 0);
  const avg    = carsA.length ? Math.round((carsA.reduce((s,c)=>s+c.count,0) + carsB.reduce((s,c)=>s+c.count,0)) / (carsA.length + carsB.length)) : 0;
  const maxCar = [...all].sort((a,b) => b.count - a.count)[0];
  const maxR   = maxCar ? maxCar.count / (maxCar.cap || 80) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statAvg').textContent   = avg;
  if (maxCar) {
    document.getElementById('statMaxCar').textContent    = `C${maxCar.id}`;
    document.getElementById('statMaxCarSub').textContent = `${maxCar.count} 人 (${Math.round(maxR*100)}%)`;
    document.getElementById('statMaxCar').style.color    = crowdColor(maxR);
  }
}

// ── Fetch station config ──
async function fetchStation() {
  try {
    const data = await fetch('/api/public/station').then(r => r.json());
    document.getElementById('stationName').textContent = data.station || '──';
    document.getElementById('lineChip').textContent    = data.line_name || data.line_id || '──';
    document.getElementById('destA').textContent       = data.directions?.[0] ?? '方向A';
    document.getElementById('destB').textContent       = data.directions?.[1] ?? '方向B';
    setLineColor(data.line_color || '#0070BD');
    document.title = `${data.station} · MRT CrowdVision`;
    numCars = data.cars || 6;
  } catch(e) {}
}

// ── Normalise car list length ──
function normaliseCars(raw, n) {
  return Array.from({length: n}, (_, i) => ({
    id: i+1, count: raw[i]?.count ?? 0, cap: raw[i]?.cap ?? 80
  }));
}

// ── Fetch crowd data ──
async function fetchCrowd() {
  try {
    const data = await fetch('/api/public/crowd').then(r => r.json());

    // 兩個方向各自獨立的車廂資料
    const carsA = normaliseCars(data.cars_A || [], numCars);
    const carsB = normaliseCars(data.cars_B || [], numCars);

    // Direction A: 正序 (C1 → C6，列車往方向A)
    // Direction B: 反序 (C6 → C1，列車從另一端進站)
    renderDiagram('diagramA', carsA, false);
    renderDiagram('diagramB', carsB, true);

    // 各方向的擁擠 pill 與統計分開計算
    updateCrowdPills(carsA, carsB);
    updateStats(carsA, carsB);
    updateETAText();

    const modelReady = data.modelReady;
    const cls = 'model-badge' + (modelReady ? '' : ' offline');
    const lbl = modelReady ? '上線中' : '離線中';
    document.getElementById('modelBadgeA').textContent = lbl;
    document.getElementById('modelBadgeA').className   = cls;
    document.getElementById('modelBadgeB').textContent = lbl;
    document.getElementById('modelBadgeB').className   = cls;
  } catch(e) {}
}

// ── Init ──
async function init() {
  await fetchStation();
  refreshSchedules();
  updateETAText();

  // Placeholder skeleton (兩方向各自空白)
  const empty = Array.from({length: numCars}, (_,i) => ({id:i+1, count:0, cap:80}));
  renderDiagram('diagramA', empty, false);
  renderDiagram('diagramB', empty, true);

  await fetchCrowd();
  setInterval(fetchCrowd,  5000);   // 每 5 秒更新一次
  setInterval(async () => { await fetchStation(); }, 30000);
}

init();
</script>
</body>
</html>
